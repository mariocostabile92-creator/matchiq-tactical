<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

<title>MatchIQ Tactical V8.2 · Home Unica Responsive</title>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#00f5a0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="MatchIQ">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/assets/matchiq-logo.png">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --bg:#03050b;
    --panel:rgba(255,255,255,.055);
    --panel-strong:rgba(255,255,255,.085);
    --border:rgba(255,255,255,.10);
    --text:#ffffff;
    --muted:#aebee7;
    --soft:#8fa3d7;
    --green:#00f5a0;
    --blue:#2f6bff;
    --gold:#ffe28a;
    --red:#ff4058;
    --purple:#8b5cf6;
    --radius:26px;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:Inter,Arial,sans-serif;
    background:
        radial-gradient(circle at 20% 0%,rgba(47,107,255,.28),transparent 32%),
        radial-gradient(circle at 88% 10%,rgba(0,245,160,.16),transparent 28%),
        radial-gradient(circle at bottom,rgba(139,92,246,.14),transparent 32%),
        linear-gradient(180deg,#07101f 0%,#03050b 58%,#02030a 100%);
    color:var(--text);
    min-height:100vh;
    padding-bottom:0;
}

button,
input,
select,
textarea{
    font-family:inherit;
}

button{
    -webkit-tap-highlight-color:transparent;
}

a{
    color:inherit;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:18px;
    padding:20px 30px;
    background:rgba(5,10,24,.88);
    border-bottom:1px solid var(--border);
    position:sticky;
    top:0;
    z-index:80;
    backdrop-filter:blur(16px);
}

.brand{
    display:flex;
    align-items:center;
    gap:12px;
    min-width:240px;
}

.brand-logo{
    width:46px;
    height:46px;
    border-radius:16px;
    background:linear-gradient(135deg,var(--green),var(--blue));
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:24px;
    box-shadow:0 18px 50px rgba(0,245,160,.16);
}

.logo{
    font-size:25px;
    font-weight:1000;
    letter-spacing:-.7px;
}

.subtitle{
    font-size:12px;
    color:var(--soft);
    margin-top:3px;
    font-weight:800;
}

.nav-actions{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    justify-content:flex-end;
}

.btn{
    border:0;
    border-radius:15px;
    padding:12px 16px;
    color:white;
    font-weight:1000;
    cursor:pointer;
    background:linear-gradient(135deg,var(--blue),#7c4dff);
    text-decoration:none;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    transition:.18s ease;
    min-height:44px;
    white-space:nowrap;
}

.btn:hover{
    transform:translateY(-1px);
    filter:brightness(1.07);
}

.btn.dark{
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.08);
}

.btn.green{
    background:linear-gradient(135deg,var(--green),var(--blue));
    color:#06111c;
}

.btn.gold{
    background:linear-gradient(135deg,#f7b733,#fc4a1a);
}

.btn.red{
    background:linear-gradient(135deg,var(--red),#8b1d35);
}

.btn.pro{
    background:linear-gradient(135deg,var(--gold),#fc4a1a);
    color:#07101f;
}

.btn.ok{
    background:linear-gradient(135deg,var(--green),var(--blue));
    color:#06111c;
}

.btn.analytics{
    background:linear-gradient(135deg,var(--purple),#00d4ff);
}

.btn.ghost{
    background:transparent;
    border:1px solid rgba(255,255,255,.13);
}

.btn:disabled{
    opacity:.70;
    cursor:not-allowed;
    transform:none;
    filter:none;
}

.account-pill{
    border:1px solid rgba(255,255,255,.12);
    background:rgba(255,255,255,.06);
    padding:9px 13px;
    border-radius:18px;
    font-size:12px;
    font-weight:900;
    min-width:142px;
}

.plan{
    display:inline-block;
    margin-top:3px;
    color:var(--gold);
    font-weight:1000;
}

.main{
    padding:28px 30px 40px;
    max-width:1480px;
    margin:0 auto;
}

.notice{
    padding:14px 16px;
    border-radius:18px;
    margin:0 0 18px;
    font-size:13px;
    font-weight:900;
    display:none;
}

.notice.show{
    display:block;
}

.notice.ok{
    color:var(--green);
    background:rgba(0,245,160,.10);
    border:1px solid rgba(0,245,160,.25);
}

.notice.err{
    color:#ffb8b8;
    background:rgba(255,70,70,.10);
    border:1px solid rgba(255,70,70,.25);
}

.notice.warn{
    color:var(--gold);
    background:rgba(247,183,51,.10);
    border:1px solid rgba(247,183,51,.25);
}

.hero{
    display:grid;
    grid-template-columns:minmax(0,1.22fr) minmax(320px,.78fr);
    gap:20px;
    align-items:stretch;
    margin-bottom:22px;
}

.card{
    background:linear-gradient(145deg,rgba(255,255,255,.075),rgba(255,255,255,.035));
    border:1px solid var(--border);
    border-radius:30px;
    padding:28px;
    box-shadow:0 25px 80px rgba(0,0,0,.24);
}

.hero-card{
    position:relative;
    overflow:hidden;
}

.hero-card:before{
    content:"";
    position:absolute;
    inset:-80px -120px auto auto;
    width:280px;
    height:280px;
    border-radius:999px;
    background:rgba(0,245,160,.10);
    filter:blur(8px);
    pointer-events:none;
}

.badge-row{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-bottom:14px;
}

.badge{
    display:inline-flex;
    align-items:center;
    gap:7px;
    padding:8px 12px;
    border-radius:999px;
    font-size:12px;
    font-weight:1000;
    border:1px solid rgba(255,255,255,.12);
    background:rgba(255,255,255,.06);
    color:#dbe6ff;
}

.badge.green{
    background:rgba(0,245,160,.12);
    border-color:rgba(0,245,160,.35);
    color:var(--green);
}

.badge.gold{
    background:rgba(247,183,51,.14);
    border-color:rgba(247,183,51,.35);
    color:var(--gold);
}

.badge.blue{
    background:rgba(47,107,255,.16);
    border-color:rgba(47,107,255,.35);
    color:#9fc0ff;
}

.hero h1{
    font-size:clamp(34px,4vw,58px);
    line-height:1.03;
    letter-spacing:-1.7px;
    margin-bottom:16px;
    max-width:980px;
}

.hero p{
    color:#c0cff4;
    line-height:1.72;
    font-size:16px;
    max-width:940px;
}

.hero strong{
    color:#fff;
}

.hero-actions{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    margin-top:22px;
}

.quick-guide{
    display:grid;
    gap:12px;
}

.guide-title{
    font-size:22px;
    font-weight:1000;
    letter-spacing:-.4px;
    margin-bottom:8px;
}

.guide-step{
    display:grid;
    grid-template-columns:42px 1fr;
    gap:12px;
    align-items:start;
    padding:14px;
    border-radius:18px;
    background:rgba(255,255,255,.045);
    border:1px solid rgba(255,255,255,.075);
}

.step-num{
    width:42px;
    height:42px;
    border-radius:15px;
    background:linear-gradient(135deg,var(--green),var(--blue));
    color:#06111c;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:1000;
}

.step-title{
    font-size:15px;
    font-weight:1000;
    margin-bottom:4px;
}

.step-text{
    color:var(--muted);
    line-height:1.5;
    font-size:13px;
}

.status-grid{
    display:grid;
    grid-template-columns:repeat(4,minmax(0,1fr));
    gap:14px;
    margin:22px 0;
}

.status-card{
    background:rgba(255,255,255,.052);
    border:1px solid rgba(255,255,255,.085);
    border-radius:22px;
    padding:17px;
}

.status-label{
    color:var(--soft);
    font-size:11px;
    text-transform:uppercase;
    font-weight:1000;
    margin-bottom:8px;
}

.status-value{
    font-size:20px;
    font-weight:1000;
}

.dot{
    display:inline-block;
    width:9px;
    height:9px;
    border-radius:50%;
    background:#32ff96;
    margin-right:8px;
    box-shadow:0 0 18px rgba(50,255,150,.8);
}

.section-head{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    gap:18px;
    margin:34px 0 16px;
}

.section-title{
    font-size:28px;
    font-weight:1000;
    letter-spacing:-.7px;
}

.section-sub{
    color:var(--muted);
    line-height:1.55;
    font-size:14px;
    margin-top:6px;
    max-width:760px;
}

.features-grid{
    display:grid;
    grid-template-columns:repeat(4,minmax(0,1fr));
    gap:16px;
}

.feature-card{
    background:rgba(255,255,255,.052);
    border:1px solid rgba(255,255,255,.09);
    border-radius:26px;
    padding:22px;
    min-height:230px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

.feature-icon{
    font-size:32px;
    margin-bottom:12px;
}

.feature-card h3{
    font-size:20px;
    margin-bottom:9px;
    letter-spacing:-.4px;
}

.feature-card p{
    color:var(--muted);
    line-height:1.58;
    font-size:14px;
}

.feature-actions{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-top:18px;
}

.feature-actions .btn{
    flex:1;
    min-width:120px;
}

.pro-active-panel,
.owner-control-panel{
    display:none;
    background:linear-gradient(145deg,rgba(0,245,160,.12),rgba(47,107,255,.07));
    border:1px solid rgba(0,245,160,.28);
    border-radius:28px;
    padding:26px;
    margin:24px 0;
}

.owner-control-panel{
    background:linear-gradient(145deg,rgba(139,92,246,.14),rgba(0,212,255,.07));
    border-color:rgba(139,92,246,.34);
}

.pro-active-panel.show,
.owner-control-panel.show{
    display:block;
}

.pro-active-panel h2,
.owner-control-panel h2{
    font-size:26px;
    margin-bottom:9px;
}

.pro-active-panel p,
.owner-control-panel p{
    color:#c8d8ff;
    line-height:1.6;
}

.pricing-grid{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:18px;
    margin:18px 0 24px;
}

.price-card{
    background:linear-gradient(145deg,rgba(255,226,138,.11),rgba(47,107,255,.06));
    border:1px solid rgba(255,226,138,.25);
    border-radius:28px;
    padding:26px;
}

.price-card h3{
    font-size:24px;
    margin-bottom:8px;
}

.price{
    font-size:40px;
    font-weight:1000;
    margin:10px 0;
}

.price small{
    font-size:15px;
    color:#b7c7ef;
}

.price-card ul{
    list-style:none;
    display:grid;
    gap:10px;
    margin:18px 0;
    color:#dbe6ff;
    line-height:1.45;
}

.live-toolbar{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
}

.matches-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(330px,1fr));
    gap:18px;
}

.match-card{
    background:linear-gradient(145deg,rgba(255,255,255,.075),rgba(255,255,255,.035));
    border:1px solid rgba(255,255,255,.09);
    border-radius:26px;
    padding:22px;
}

.league{
    font-size:12px;
    color:#78a7ff;
    font-weight:900;
    margin-bottom:18px;
}

.teams{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
}

.team{
    text-align:center;
    width:38%;
}

.team img{
    width:66px;
    height:66px;
    object-fit:contain;
    margin-bottom:10px;
}

.team-name{
    font-weight:1000;
    font-size:16px;
}

.score{
    text-align:center;
}

.score-num{
    font-size:40px;
    font-weight:1000;
}

.minute{
    display:inline-block;
    margin-top:8px;
    background:var(--red);
    color:white;
    font-size:12px;
    padding:7px 10px;
    border-radius:999px;
    font-weight:1000;
}

.match-actions{
    display:flex;
    gap:10px;
    margin-top:22px;
}

.match-actions button{
    flex:1;
    border:0;
    border-radius:14px;
    padding:13px;
    color:white;
    font-weight:1000;
    cursor:pointer;
}

.analysis{
    background:linear-gradient(135deg,var(--blue),#5e86ff);
}

.scout{
    background:linear-gradient(135deg,#00c980,var(--blue));
}

.beta-form-wrap{
    display:grid;
    grid-template-columns:1fr .8fr;
    gap:20px;
    margin:18px 0 24px;
}

.beta-form,
.beta-info{
    background:rgba(255,255,255,.055);
    border:1px solid rgba(255,255,255,.10);
    border-radius:28px;
    padding:26px;
}

.beta-form h2,
.beta-info h2{
    font-size:24px;
    margin-bottom:9px;
}

.beta-form p,
.beta-info p{
    color:var(--muted);
    line-height:1.6;
    margin-bottom:18px;
}

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
}

.form-field{
    display:flex;
    flex-direction:column;
    gap:7px;
}

.form-field.full{
    grid-column:1/-1;
}

.form-field label{
    color:var(--soft);
    font-size:12px;
    font-weight:900;
}

.form-field input,
.form-field select,
.form-field textarea{
    width:100%;
    border:1px solid rgba(255,255,255,.10);
    background:rgba(4,8,18,.85);
    color:#fff;
    border-radius:14px;
    padding:13px 14px;
    outline:none;
    font-weight:800;
}

.form-field textarea{
    min-height:96px;
    resize:vertical;
}

.form-message{
    margin-top:14px;
    padding:13px 14px;
    border-radius:16px;
    display:none;
    font-size:13px;
    font-weight:900;
}

.form-message.show{
    display:block;
}

.form-message.ok{
    color:var(--green);
    background:rgba(0,245,160,.10);
    border:1px solid rgba(0,245,160,.25);
}

.form-message.err{
    color:#ffb8b8;
    background:rgba(255,70,70,.10);
    border:1px solid rgba(255,70,70,.25);
}

.beta-info ul{
    list-style:none;
    display:grid;
    gap:12px;
    color:#b7c7ef;
    line-height:1.5;
}

.beta-info li{
    padding:12px 14px;
    border-radius:16px;
    background:rgba(255,255,255,.045);
}

.loading{
    padding:40px;
    text-align:center;
    color:#9fb2e7;
}

.error{
    padding:20px;
    border-radius:18px;
    color:#ffb8b8;
    background:rgba(255,70,70,.12);
    border:1px solid rgba(255,70,70,.25);
}

.bottom-nav{
    display:none;
}

@media(max-width:1180px){
    .features-grid{
        grid-template-columns:repeat(2,minmax(0,1fr));
    }

    .status-grid{
        grid-template-columns:repeat(2,minmax(0,1fr));
    }

    .hero{
        grid-template-columns:1fr;
    }

    .beta-form-wrap{
        grid-template-columns:1fr;
    }
}

@media(max-width:860px){
    body{
        padding-bottom:92px;
    }

    .topbar{
        position:relative;
        padding:16px;
        align-items:flex-start;
        flex-direction:column;
    }

    .brand{
        min-width:0;
        width:100%;
    }

    .brand-logo{
        width:42px;
        height:42px;
        border-radius:15px;
    }

    .logo{
        font-size:21px;
    }

    .subtitle{
        font-size:11px;
    }

    .nav-actions{
        width:100%;
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:9px;
    }

    .nav-actions .btn{
        width:100%;
        padding:11px 12px;
        font-size:12px;
    }

    .account-pill{
        grid-column:1/-1;
        width:100%;
        min-width:0;
    }

    .main{
        padding:16px;
    }

    .card{
        border-radius:24px;
        padding:22px;
    }

    .hero h1{
        font-size:34px;
        letter-spacing:-1.1px;
    }

    .hero p{
        font-size:15px;
    }

    .hero-actions{
        display:grid;
        grid-template-columns:1fr;
    }

    .hero-actions .btn{
        width:100%;
    }

    .status-grid{
        grid-template-columns:1fr 1fr;
        gap:10px;
    }

    .status-card{
        padding:14px;
        border-radius:18px;
    }

    .status-value{
        font-size:17px;
    }

    .features-grid,
    .pricing-grid{
        grid-template-columns:1fr;
    }

    .section-head{
        align-items:flex-start;
        flex-direction:column;
        margin-top:28px;
    }

    .live-toolbar{
        width:100%;
        display:grid;
        grid-template-columns:1fr 1fr;
    }

    .live-toolbar .btn{
        width:100%;
    }

    .matches-grid{
        grid-template-columns:1fr;
    }

    .match-card{
        padding:18px;
        border-radius:22px;
    }

    .team img{
        width:52px;
        height:52px;
    }

    .score-num{
        font-size:34px;
    }

    .form-grid{
        grid-template-columns:1fr;
    }

    .bottom-nav{
        position:fixed;
        left:10px;
        right:10px;
        bottom:10px;
        z-index:100;
        display:grid;
        grid-template-columns:repeat(4,1fr);
        gap:8px;
        padding:8px;
        border-radius:24px;
        background:rgba(4,8,18,.92);
        border:1px solid rgba(255,255,255,.12);
        backdrop-filter:blur(18px);
        box-shadow:0 22px 60px rgba(0,0,0,.45);
    }

    .bottom-nav button{
        border:0;
        border-radius:18px;
        padding:10px 6px;
        background:rgba(255,255,255,.06);
        color:#dbe6ff;
        font-size:11px;
        font-weight:1000;
        cursor:pointer;
        min-height:52px;
    }

    .bottom-nav button.active{
        background:linear-gradient(135deg,var(--green),var(--blue));
        color:#06111c;
    }
}

@media(max-width:420px){
    .nav-actions{
        grid-template-columns:1fr;
    }

    .status-grid{
        grid-template-columns:1fr;
    }

    .hero h1{
        font-size:31px;
    }

    .section-title{
        font-size:24px;
    }

    .match-actions{
        flex-direction:column;
    }
}
</style>
</head>

<script>
const API_BASE = `${window.location.origin}/api`;
const OWNER_EMAIL = "mario.costabile92@outlook.it";
const APP_VERSION = "10220";
const BETA_STORAGE_KEY = "matchiq_beta_requests_v82";

let accountPlan = {
    plan: "guest",
    label: "Guest",
    limits: {
        max_live_matches: 3,
        scout_enabled: true,
        scout_preview: true,
        export_enabled: false,
        pdf_enabled: false
    },
    features: {}
};

function getAuthToken(){
    return localStorage.getItem("matchiq_auth_token") || sessionStorage.getItem("matchiq_auth_token") || "";
}

function setAuthToken(token){
    if(token){
        localStorage.setItem("matchiq_auth_token", token);
    }
}

function getLocalUser(){
    try{
        const raw =
            localStorage.getItem("matchiq_auth_user") ||
            localStorage.getItem("matchiq_user") ||
            sessionStorage.getItem("matchiq_auth_user") ||
            sessionStorage.getItem("matchiq_user");

        const user = JSON.parse(raw || "null");
        return user && typeof user === "object" ? user : null;
    }catch{
        return null;
    }
}

function saveLocalUser(user){
    if(!user || typeof user !== "object") return;

    localStorage.setItem("matchiq_auth_user", JSON.stringify(user));

    if(user.email){
        localStorage.setItem("matchiq_user_email", user.email);
    }

    if(user.plan || user.piano){
        localStorage.setItem("matchiq_user_plan", user.plan || user.piano);
    }
}

function isLoggedIn(){
    return Boolean(getAuthToken());
}

function isOwnerLocalUser(user){
    if(!user) return false;

    const email = String(user.email || "").toLowerCase().trim();
    const plan = String(user.plan || user.piano || user.role || "").toLowerCase().trim();

    return email === OWNER_EMAIL || ["owner","owner_pro","admin"].includes(plan);
}

function isOwnerAccount(){
    const user = getLocalUser();
    return isOwnerLocalUser(user) || String(accountPlan.plan || "").toLowerCase() === "owner";
}

function isProPlan(){
    const p = String(accountPlan.plan || "").toLowerCase();
    return ["pro","scout","owner","admin","owner_pro"].includes(p);
}

function showNotice(message,type="ok",timeout=7000){
    const el = document.getElementById("pageNotice");
    if(!el) return;

    el.textContent = message;
    el.className = `notice show ${type}`;

    if(timeout){
        setTimeout(() => {
            el.className = "notice";
        },timeout);
    }
}

function scrollToHome(){
    document.getElementById("home")?.scrollIntoView({
        behavior:"smooth",
        block:"start"
    });
}

function scrollToLive(){
    document.getElementById("liveSection")?.scrollIntoView({
        behavior:"smooth",
        block:"start"
    });
}

function scrollToBetaForm(){
    document.getElementById("betaAccessForm")?.scrollIntoView({
        behavior:"smooth",
        block:"start"
    });
}

function readPaymentParams(){
    const p = new URLSearchParams(window.location.search);
    const payment = p.get("payment");

    if(payment === "success"){
        showNotice("Pagamento completato. Piano Pro in aggiornamento...", "ok", 9000);

        setTimeout(async () => {
            await refreshSubscriptionState();
            await loadAccountLimits();

            if(isProPlan()){
                showNotice("Pagamento completato. Piano Pro attivo.", "ok", 9000);
            }else{
                showNotice("Pagamento ricevuto. Se il piano non si aggiorna subito, attendi qualche secondo e ricarica.", "warn", 9000);
            }
        },1500);
    }

    if(payment === "cancel"){
        showNotice("Pagamento annullato. Puoi riprovare quando vuoi.", "warn", 8000);
    }
}

async function refreshSubscriptionState(){
    const token = getAuthToken();

    if(!token) return null;

    try{
        const res = await fetch(`${API_BASE}/payments/subscription?ts=${Date.now()}`, {
            headers:{
                "Authorization":"Bearer " + token
            },
            cache:"no-store"
        });

        const data = await res.json();

        if(data && data.plan){
            accountPlan.plan = data.plan;
            accountPlan.label = data.plan;

            const user = getLocalUser() || {};
            user.plan = data.plan;
            saveLocalUser(user);

            applyAccountUI();
        }

        return data;

    }catch(e){
        console.warn("Subscription state non disponibile", e);
        return null;
    }
}

function updateProButtons(){
    const proButtons = [
        document.getElementById("upgradeBtnTop"),
        document.getElementById("heroProBtn"),
        ...document.querySelectorAll(".pricing-pro-btn")
    ].filter(Boolean);

    const alreadyPro = isProPlan() || isOwnerAccount();

    proButtons.forEach(btn => {
        btn.style.display = "inline-flex";

        if(alreadyPro){
            btn.textContent = isOwnerAccount() ? "Owner Pro attivo" : "Piano Pro attivo";
            btn.disabled = true;
            btn.classList.remove("pro");
            btn.classList.add("ok");
        }else{
            btn.disabled = false;
            btn.classList.remove("ok");
            btn.classList.add("pro");

            if(btn.id === "upgradeBtnTop"){
                btn.textContent = "Passa a Pro";
            }else if(btn.id === "heroProBtn"){
                btn.textContent = "Sblocca Pro";
            }
        }
    });
}

function updatePricingVisibility(){
    const pricing = document.getElementById("pricing");
    const panel = document.getElementById("proActivePanel");
    const ownerPanel = document.getElementById("ownerControlPanel");

    const alreadyPro = isProPlan() || isOwnerAccount();
    const owner = isOwnerAccount();

    if(pricing){
        pricing.style.display = alreadyPro ? "none" : "block";
    }

    if(panel){
        panel.className = alreadyPro ? "pro-active-panel show" : "pro-active-panel";
    }

    if(ownerPanel){
        ownerPanel.className = owner ? "owner-control-panel show" : "owner-control-panel";
    }
}

function applyAccountUI(){
    const user = getLocalUser();

    const emailEl = document.getElementById("userEmail");
    const planEl = document.getElementById("userPlan");
    const adminBtn = document.getElementById("adminActionsBtn");
    const adminUsersBtn = document.getElementById("adminUsersBtn");
    const adminAnalyticsBtn = document.getElementById("adminAnalyticsBtn");
    const accountBtn = document.getElementById("accountBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const loginBtn = document.getElementById("loginBtn");
    const registerBtn = document.getElementById("registerBtn");
    const statusPlanLabel = document.getElementById("statusPlanLabel");
    const launchNote = document.getElementById("launchNote");
    const heroBadge = document.getElementById("heroBadge");

    const isOwner = isOwnerLocalUser(user) || String(accountPlan.plan || "").toLowerCase() === "owner";

    if(isOwner){
        accountPlan.plan = "owner";
        accountPlan.label = "Owner";
        accountPlan.limits = {
            ...(accountPlan.limits || {}),
            max_live_matches: 999,
            scout_enabled: true,
            scout_preview: false,
            export_enabled: true,
            pdf_enabled: true
        };

        if(emailEl) emailEl.textContent = user?.email || OWNER_EMAIL;
        if(planEl) planEl.textContent = "OWNER PRO";
        if(accountBtn) accountBtn.style.display = "inline-flex";
        if(adminBtn) adminBtn.style.display = "inline-flex";
        if(adminUsersBtn) adminUsersBtn.style.display = "inline-flex";
        if(adminAnalyticsBtn) adminAnalyticsBtn.style.display = "inline-flex";
        if(logoutBtn) logoutBtn.style.display = "inline-flex";
        if(loginBtn) loginBtn.style.display = "none";
        if(registerBtn) registerBtn.style.display = "none";
        if(statusPlanLabel) statusPlanLabel.textContent = "Owner Pro";
        if(launchNote) launchNote.textContent = "Owner attivo: analisi, Scout, Coach, Admin e Pro sbloccati.";
        if(heroBadge) heroBadge.textContent = "OWNER PRO ACTIVE";

        updateProButtons();
        updatePricingVisibility();
        return;
    }

    if(accountPlan.plan === "guest" || !isLoggedIn()){
        if(emailEl) emailEl.textContent = "Utente ospite";
        if(planEl) planEl.textContent = "GUEST";
        if(accountBtn) accountBtn.style.display = "none";
        if(adminBtn) adminBtn.style.display = "none";
        if(adminUsersBtn) adminUsersBtn.style.display = "none";
        if(adminAnalyticsBtn) adminAnalyticsBtn.style.display = "none";
        if(logoutBtn) logoutBtn.style.display = "none";
        if(loginBtn) loginBtn.style.display = "inline-flex";
        if(registerBtn) registerBtn.style.display = "inline-flex";
        if(statusPlanLabel) statusPlanLabel.textContent = "Guest";
        if(launchNote) launchNote.textContent = "Puoi provare MatchIQ anche senza account. Per salvare piano e Pro, effettua login o registrati.";
        if(heroBadge) heroBadge.textContent = "MATCHIQ V8.2";

        updateProButtons();
        updatePricingVisibility();
        return;
    }

    if(emailEl) emailEl.textContent = user?.email || "Utente";
    if(planEl) planEl.textContent = String(accountPlan.label || accountPlan.plan || "FREE").toUpperCase();
    if(accountBtn) accountBtn.style.display = "inline-flex";
    if(adminBtn) adminBtn.style.display = "none";
    if(adminUsersBtn) adminUsersBtn.style.display = "none";
    if(adminAnalyticsBtn) adminAnalyticsBtn.style.display = "none";
    if(logoutBtn) logoutBtn.style.display = "inline-flex";
    if(loginBtn) loginBtn.style.display = "none";
    if(registerBtn) registerBtn.style.display = "none";

    if(statusPlanLabel){
        statusPlanLabel.textContent = isProPlan() ? "Pro attivo" : "Free attivo";
    }

    if(launchNote){
        launchNote.textContent = isProPlan()
            ? "Piano Pro attivo: limiti estesi e funzioni avanzate disponibili."
            : "Piano Free attivo: prova Coach, Scout e analisi live. Passa a Pro per uso continuativo.";
    }

    if(heroBadge){
        heroBadge.textContent = isProPlan() ? "PRO PLAN ACTIVE" : "FREE PLAN ACTIVE";
    }

    updateProButtons();
    updatePricingVisibility();
}

async function loadAccountLimits(){
    try{
        const token = getAuthToken();
        const headers = token ? {"Authorization": "Bearer " + token} : {};

        const res = await fetch(`${API_BASE}/account/limits?ts=${Date.now()}`, {
            headers,
            cache:"no-store"
        });

        const data = await res.json();

        if(data && (data.success || data.ok || data.plan)){
            accountPlan = {
                plan: data.plan || "guest",
                label: data.label || data.plan || "Guest",
                limits: data.limits || accountPlan.limits,
                features: data.features || {}
            };

            const user = getLocalUser();

            if(user && data.plan){
                user.plan = data.plan;
                saveLocalUser(user);
            }
        }
    }catch(e){
        console.warn("Account limits non disponibili", e);
    }

    applyAccountUI();
}

function goRegister(){

function logout(){
    localStorage.removeItem("matchiq_auth_user");
    localStorage.removeItem("matchiq_user");

    localStorage.removeItem("matchiq_user_email");

async function startCheckout(plan="pro_monthly"){
    const token = getAuthToken();
    const localUser = getLocalUser();

    if(isProPlan() || isOwnerAccount() || isOwnerLocalUser(localUser)){
        showNotice("Il tuo piano Pro è già attivo. Non devi acquistare un altro abbonamento.", "ok");
        applyAccountUI();
        return;
    }

    if(!token){
        showNotice("Per attivare Pro devi prima fare login o registrarti.", "warn");
        setTimeout(() => {
            goLogin();
        },900);
        return;
    }

    const buttons = document.querySelectorAll(".btn.pro,.btn.ok");
    buttons.forEach(b => b.disabled = true);

    try{
        const res = await fetch(`${API_BASE}/payments/create-checkout-session`, {
            method:"POST",
            headers:{
                "Content-Type":"application/json",
                "Authorization":"Bearer " + token
            },
            body:JSON.stringify({plan})
        });

        const data = await res.json();

        if(res.status === 409){
            const detail = data.detail || {};
            const message = detail.message || "Hai già un piano Pro attivo.";

            showNotice(message, "ok");

            accountPlan.plan = "pro";
            accountPlan.label = "Pro";

            const user = getLocalUser() || {};
            user.plan = "pro";
            saveLocalUser(user);

            applyAccountUI();
            return;
        }

        if(!res.ok || data.success === false || data.ok === false){
            const detail = data.detail;

            if(typeof detail === "object" && detail.message){
                throw new Error(detail.message);
            }

            throw new Error(detail || data.message || "Errore creazione checkout Stripe");
        }

        const checkoutUrl = data.checkout_url || data.url;

        if(!checkoutUrl){
            throw new Error("Checkout URL non ricevuto dal backend");
        }

        window.location.href = checkoutUrl;

    }catch(e){
        console.error(e);
        showNotice("Errore Stripe: " + e.message, "err");
    }finally{
        buttons.forEach(b => b.disabled = false);
        applyAccountUI();
    }
}

async function submitBetaRequest(){
    const name = document.getElementById("betaName").value.trim();
    const email = document.getElementById("betaEmail").value.trim();
    const profile = document.getElementById("betaProfile").value.trim();
    const plan = document.getElementById("betaPlan").value.trim();
    const reason = document.getElementById("betaReason").value.trim();

    if(!name || !email || !profile){
        showBetaMessage("Compila almeno nome, email e profilo.", "err");
        return;
    }

    if(!email.includes("@") || !email.includes(".")){
        showBetaMessage("Inserisci una email valida.", "err");
        return;
    }

    const request = {
        name,
        email,
        profile,
        plan,
        reason
    };

    try{
        const res = await fetch(`${API_BASE}/beta-request`, {
            method:"POST",
            headers:{
                "Content-Type":"application/json",
                "Accept":"application/json"
            },
            body:JSON.stringify(request)
        });

        const data = await res.json();

        if(!res.ok || data.ok === false){
            throw new Error(data.message || data.reason || "Errore salvataggio richiesta beta");
        }

        saveBetaRequestLocal({
            ...request,
            id: data?.request?.id || `beta_${Date.now()}`,
            created_at: new Date().toISOString()
        });

        showBetaMessage("Richiesta beta inviata correttamente. Ti ricontatteremo presto.", "ok");

    }catch(e){
        saveBetaRequestLocal({
            ...request,
            id:`beta_${Date.now()}`,
            created_at:new Date().toISOString()
        });

        showBetaMessage("Richiesta salvata localmente. Errore server: " + e.message, "err");
    }
}

function saveBetaRequestLocal(request){
    const saved = getSavedBetaRequests();
    saved.unshift(request);
    localStorage.setItem(BETA_STORAGE_KEY, JSON.stringify(saved));
}

function getSavedBetaRequests(){
    try{
        const raw = localStorage.getItem(BETA_STORAGE_KEY);
        const parsed = JSON.parse(raw || "[]");
        return Array.isArray(parsed) ? parsed : [];
    }catch{
        return [];
    }
}

function viewSavedBetaRequests(){
    const saved = getSavedBetaRequests();

    if(!saved.length){
        showBetaMessage("Non ci sono ancora richieste beta salvate in questo browser.", "err");
        return;
    }

    const last = saved[0];
    showBetaMessage(`Richieste salvate: ${saved.length}. Ultima: ${last.name} (${last.email})`, "ok");
}

function showBetaMessage(message,type="ok"){
    const el = document.getElementById("betaFormMessage");
    if(!el) return;

    el.textContent = message;
    el.className = `form-message show ${type}`;
}

function safe(v,d="--"){
    return v === undefined || v === null || v === "" ? d : v;
}

function getMatchId(match){
    return match.match_id || match.fixture_id || match.id;
}

function formatScore(match){
    if(typeof match.score === "string") return match.score;

    if(typeof match.score === "object" && match.score){
        return `${safe(match.score.home,0)}-${safe(match.score.away,0)}`;
    }

    return `${safe(match.home_goals,0)}-${safe(match.away_goals,0)}`;
}

async function loadMatches(topOnly=true){
    const container = document.getElementById("matchesContainer");
    if(!container) return;

    container.innerHTML = `<div class="loading">Caricamento partite live...</div>`;

    try{
        const url = topOnly
            ? `${API_BASE}/live-matches?top_only=true`
            : `${API_BASE}/live-matches?top_only=false`;

        const res = await fetch(url, {cache:"no-store"});
        const data = await res.json();

        const matches = data.matches || [];
        const maxVisible = Number(accountPlan?.limits?.max_live_matches || matches.length || 999);
        const visibleMatches = matches.slice(0, maxVisible >= 999 ? matches.length : maxVisible);

        const liveCount = document.getElementById("liveCount");
        if(liveCount) liveCount.textContent = matches.length;

        if(!matches.length){
            container.innerHTML = `
                <div class="error">
                    Nessuna partita live disponibile ora. Puoi comunque usare Coach Mode per creare una partita manuale e generare report.
                    <div class="hero-actions" style="margin-top:14px">
                        <button class="btn green" onclick="openCoach()">Apri Coach</button>
                    </div>
                </div>
            `;
            return;
        }

        let limitNotice = "";

        if(visibleMatches.length < matches.length){
            limitNotice = `
                <div class="match-card" style="border-color:rgba(247,183,51,.45);background:rgba(247,183,51,.08)">
                    <div class="league" style="color:#ffe28a">PIANO FREE / GUEST</div>
                    <p style="color:#ffe28a;font-weight:900;line-height:1.5">
                        Stai vedendo ${visibleMatches.length} partite su ${matches.length}.
                        Passa a Pro per sbloccare limiti estesi e funzioni avanzate.
                    </p>
                    <div class="hero-actions">
                        <button class="btn pro" onclick="startCheckout('pro_monthly')">Passa a Pro</button>
                    </div>
                </div>
            `;
        }

        container.innerHTML = limitNotice + visibleMatches.map(match=>{
            const id = getMatchId(match);
            const score = formatScore(match);

            return `
                <div class="match-card">
                    <div class="league">${safe(match.league,"Live Match")}</div>

                    <div class="teams">
                        <div class="team">
                            <img src="${safe(match.home_logo,"")}" onerror="this.style.display='none'">
                            <div class="team-name">${safe(match.home)}</div>
                        </div>

                        <div class="score">
                            <div class="score-num">${score}</div>
                            <div class="minute">${safe(match.minute,0)}'</div>
                        </div>

                        <div class="team">
                            <img src="${safe(match.away_logo,"")}" onerror="this.style.display='none'">
                            <div class="team-name">${safe(match.away)}</div>
                        </div>
                    </div>

                    <div class="match-actions">
                        <button class="analysis" onclick="openAnalysis('${String(id)}')">
                            Analisi
                        </button>
                        <button class="scout" onclick="openScout('${String(id)}')">
                            Scout
                        </button>
                    </div>
                </div>
            `;
        }).join("");

        updateProButtons();

    }catch(e){
        container.innerHTML = `
            <div class="error">
                Errore caricamento live: ${e.message}
                <div class="hero-actions" style="margin-top:14px">
                    <button class="btn dark" onclick="loadMatches(false)">Riprova</button>
                    <button class="btn green" onclick="openCoach()">Apri Coach</button>
                </div>
            </div>
        `;
    }
}
