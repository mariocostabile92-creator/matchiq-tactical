<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MatchIQ Admin Users V9</title>
<script src="js/auth.js?v=10523"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,Arial,sans-serif;background:radial-gradient(circle at top,#162447,#070b16 58%,#03050b);color:#fff;min-height:100vh}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:18px;padding:22px 30px;background:rgba(9,15,32,.94);border-bottom:1px solid rgba(255,255,255,.08);position:sticky;top:0;z-index:40;backdrop-filter:blur(14px)}
.logo{font-size:26px;font-weight:1000}
.subtitle{color:#8fa3d7;font-size:13px;margin-top:4px}
.actions{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.btn{border:0;border-radius:14px;padding:12px 16px;color:white;font-weight:1000;cursor:pointer;background:linear-gradient(135deg,#2f6bff,#7c4dff);text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:8px}
.btn.dark{background:rgba(255,255,255,.08)}
.btn.green{background:linear-gradient(135deg,#00c980,#2f6bff)}
.btn.gold{background:linear-gradient(135deg,#f7b733,#fc4a1a);color:#06111c}
.btn.cyan{background:linear-gradient(135deg,#00f5a0,#38bdf8);color:#06111c}
.btn.red{background:linear-gradient(135deg,#ff4058,#8b1d35)}
.btn:disabled{opacity:.65;cursor:not-allowed}
.main{max-width:1600px;margin:0 auto;padding:30px}
.notice{padding:14px 16px;border-radius:18px;margin-bottom:18px;display:none;font-size:13px;font-weight:900}
.notice.show{display:block}
.notice.ok{color:#00f5a0;background:rgba(0,245,160,.10);border:1px solid rgba(0,245,160,.25)}
.notice.err{color:#ffb8b8;background:rgba(255,70,70,.10);border:1px solid rgba(255,70,70,.25)}
.notice.warn{color:#ffe28a;background:rgba(247,183,51,.10);border:1px solid rgba(247,183,51,.25)}
.panel{background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.09);border-radius:28px;padding:24px;box-shadow:0 25px 80px rgba(0,0,0,.25);margin-bottom:22px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:22px}
.stat{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:22px;padding:18px}
.stat small{color:#8fa3d7;font-weight:900;font-size:12px}
.stat strong{display:block;font-size:32px;margin-top:8px}
.filters{display:grid;grid-template-columns:1.2fr .6fr .7fr .4fr auto;gap:12px;align-items:end}
.filter-actions{display:flex;gap:8px;align-items:center}
.field{display:flex;flex-direction:column;gap:7px}
.field label{color:#8fa3d7;font-size:12px;font-weight:900}
input,select{width:100%;border:1px solid rgba(255,255,255,.10);background:rgba(4,8,18,.85);color:#fff;border-radius:14px;padding:13px 14px;outline:none;font-weight:800}
.table-wrap{overflow:auto;border-radius:22px;border:1px solid rgba(255,255,255,.08)}
table{width:100%;border-collapse:collapse;min-width:1320px}
thead{background:rgba(255,255,255,.07)}
th,td{padding:14px;border-bottom:1px solid rgba(255,255,255,.07);text-align:left;font-size:13px;vertical-align:middle}
th{color:#9fb2e7;font-size:12px;text-transform:uppercase;letter-spacing:.04em}
td{color:#eaf0ff}
.email-cell{font-weight:1000}
.badge{display:inline-flex;align-items:center;justify-content:center;padding:7px 10px;border-radius:999px;font-size:11px;font-weight:1000;text-transform:uppercase}
.badge.free{color:#cfe0ff;background:rgba(143,163,215,.14);border:1px solid rgba(143,163,215,.28)}
.badge.pro{color:#00f5a0;background:rgba(0,245,160,.12);border:1px solid rgba(0,245,160,.28)}
.badge.scout{color:#8ee7ff;background:rgba(73,210,255,.12);border:1px solid rgba(73,210,255,.28)}
.badge.owner{color:#ffe28a;background:rgba(255,226,138,.14);border:1px solid rgba(255,226,138,.32)}
.badge.inactive{color:#ffb8b8;background:rgba(255,70,70,.12);border:1px solid rgba(255,70,70,.25)}
.badge.active{color:#00f5a0;background:rgba(0,245,160,.10);border:1px solid rgba(0,245,160,.24)}
.badge.verify{color:#00f5a0;background:rgba(0,245,160,.10);border:1px solid rgba(0,245,160,.24)}
.badge.unverify{color:#ffe28a;background:rgba(247,183,51,.12);border:1px solid rgba(247,183,51,.28)}
.row-actions{display:flex;gap:8px;flex-wrap:wrap}
.row-actions select{min-width:120px;padding:10px}
.row-actions button{padding:10px 12px;border-radius:12px;font-size:12px}
.muted{color:#8fa3d7;font-size:12px;line-height:1.5}
.usage-pill{display:inline-flex;align-items:center;justify-content:center;min-width:34px;padding:6px 9px;border-radius:999px;background:rgba(47,107,255,.14);border:1px solid rgba(47,107,255,.28);color:#dbeafe;font-weight:1000}
.video-cell strong{display:block;color:#fff}
.video-cell .hot{color:#00f5a0}
.loading{padding:30px;text-align:center;color:#9fb2e7;font-weight:900}
@media(max-width:1000px){
  .topbar{flex-direction:column;align-items:flex-start}
  .actions{width:100%}
  .btn{width:100%}
  .filters{grid-template-columns:1fr}
  .filter-actions{flex-direction:column;align-items:stretch}
}
</style>
<link rel="stylesheet" href="/css/global-nav.css?v=10523">
</head>

<body data-miq-module="admin">
<template><div class="topbar">
  <div>
    <div class="logo">🛡️ MatchIQ Admin Users</div>
    <div class="subtitle">Gestione utenti, piani, verifica email e stato account · V9 Professional</div>
  </div>
  <div class="actions">
    <button class="btn dark" onclick="goDashboard()">Dashboard</button>
    <button class="btn dark" onclick="goAdminBeta()">Admin Beta</button>
    <button class="btn dark" onclick="goAnalytics()">Analytics</button>
    <button class="btn green" onclick="loadUsers()">Aggiorna</button>
  </div>
</div></template>

<div class="miq-module-toolbar" aria-label="Strumenti Admin Users">
  <span class="miq-toolbar-state">Gestione utenti</span>
  <button class="btn dark" type="button" onclick="goAdminBeta()">Richieste Beta</button>
  <button class="btn dark" type="button" onclick="goAnalytics()">Analytics</button>
  <button class="btn green" type="button" onclick="loadUsers()">Aggiorna</button>
</div>

<div class="main">
  <div id="pageNotice" class="notice"></div>

  <div class="stats-grid">
    <div class="stat"><small>Utenti totali</small><strong id="statTotal">--</strong></div>
    <div class="stat"><small>Free</small><strong id="statFree">--</strong></div>
    <div class="stat"><small>Pro</small><strong id="statPro">--</strong></div>
    <div class="stat"><small>Scout/Owner</small><strong id="statScoutOwner">--</strong></div>
    <div class="stat"><small>Subscription attive</small><strong id="statSubActive">--</strong></div>
    <div class="stat"><small>Lead Video AI</small><strong id="statVideoLeads">--</strong></div>
  </div>

  <div class="panel">
    <div class="filters">
      <div class="field">
        <label>Cerca email / Stripe ID</label>
        <input id="searchInput" placeholder="email, customer id, subscription id..." />
      </div>

      <div class="field">
        <label>Piano</label>
        <select id="planFilter">
          <option value="all">Tutti</option>
          <option value="free">Free</option>
          <option value="pro">Pro</option>
          <option value="scout">Scout</option>
          <option value="owner">Owner</option>
        </select>
      </div>

      <div class="field">
        <label>Stato</label>
        <select id="statusFilter">
          <option value="all">Tutti</option>
          <option value="active">Utenti attivi</option>
          <option value="disabled">Disattivati</option>
          <option value="verified">Email verificata</option>
          <option value="unverified">Email non verificata</option>
          <option value="sub_active">Subscription attiva</option>
          <option value="sub_missing">Senza subscription</option>
          <option value="video_today">Video AI oggi</option>
          <option value="video_7d">Video AI ultimi 7 giorni</option>
          <option value="video_any">Ha usato Video AI</option>
          <option value="free_video_lead">Free caldo Video AI</option>
        </select>
      </div>

      <div class="field">
        <label>Limit</label>
        <select id="limitFilter">
          <option value="100">100</option>
          <option value="300" selected>300</option>
          <option value="500">500</option>
          <option value="1000">1000</option>
        </select>
      </div>

      <div class="filter-actions">
        <button class="btn green" onclick="loadUsers()">Filtra</button>
        <button class="btn cyan" onclick="exportVideoLeads()">Export Video CSV</button>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Email</th>
            <th>Piano</th>
            <th>Utente</th>
            <th>Email verifica</th>
            <th>Subscription</th>
            <th>Provider</th>
            <th>Periodo</th>
            <th>Usage oggi</th>
            <th>Video AI</th>
            <th>Creato</th>
            <th>Azioni</th>
          </tr>
        </thead>
        <tbody id="usersBody">
          <tr><td colspan="12" class="loading">Caricamento utenti...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
const API_BASE = `${window.location.origin}/api`;
const APP_VERSION = "10472";
let usersCache = [];

function adminHeaders(extra = {}){
  if(window.MatchIQAuth && typeof MatchIQAuth.adminHeaders === "function"){
    return MatchIQAuth.adminHeaders(extra);
  }
  return {"Accept":"application/json", ...extra};
}

function hasAdminAccess(){
  if(window.MatchIQAuth && typeof MatchIQAuth.hasAdminAccess === "function"){
    return MatchIQAuth.hasAdminAccess();
  }
  return Boolean(window.MatchIQAuth && MatchIQAuth.getAdminToken && MatchIQAuth.getAdminToken());
}

function showNotice(message,type="ok",timeout=7000){
  const el=document.getElementById("pageNotice");
  if(!el)return;
  el.textContent=message;
  el.className=`notice show ${type}`;
  if(timeout)setTimeout(()=>{el.className="notice"},timeout);
}

function goDashboard(){window.location.href=`/index.html?v=${APP_VERSION}`}
function goAdminBeta(){window.location.href=`/admin-beta.html?v=${APP_VERSION}`}
function goAnalytics(){window.location.href=`/admin-analytics.html?v=${APP_VERSION}`}

function formatDate(value){
  if(!value)return"--";
  try{
    const d=new Date(value);
    if(Number.isNaN(d.getTime()))return String(value);
    return d.toLocaleDateString("it-IT",{year:"numeric",month:"2-digit",day:"2-digit"});
  }catch{
    return String(value);
  }
}

function normalizePlan(value){
  return String(value||"free").toLowerCase().trim();
}

function escapeHtml(value){
  return String(value ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function csvCell(value){
  const text=String(value ?? "");
  return `"${text.replaceAll('"','""')}"`;
}

function planBadge(plan){
  const p=normalizePlan(plan);
  if(p==="owner")return`<span class="badge owner">OWNER</span>`;
  if(p==="scout")return`<span class="badge scout">SCOUT</span>`;
  if(p==="pro")return`<span class="badge pro">PRO</span>`;
  return`<span class="badge free">FREE</span>`;
}

function activeBadge(isActive){
  return Number(isActive)===1 || isActive===true
    ? `<span class="badge active">ATTIVO</span>`
    : `<span class="badge inactive">DISATTIVO</span>`;
}

function verificationBadge(value){
  return Number(value)===1 || value===true
    ? `<span class="badge verify">VERIFICATA</span>`
    : `<span class="badge unverify">NON VERIFICATA</span>`;
}

function subBadge(status){
  const s=String(status||"").toLowerCase();
  if(s==="active")return`<span class="badge pro">ACTIVE</span>`;
  if(!s)return`<span class="badge free">NO SUB</span>`;
  return`<span class="badge inactive">${escapeHtml(s)}</span>`;
}

function videoLeadEmailUrl(user){
  const email=String(user?.email||"").trim();
  const reports=Number(user?.video_reports_total||0);
  const recent=Number(user?.video_reports_last_7_days||0);
  const subject="MatchIQ Video Analyst - report video e piano Pro";
  const body=[
    "Ciao,",
    "",
    "ho visto che hai provato MatchIQ Video Analyst, la funzione che trasforma una clip partita in un report tecnico PDF per lo staff.",
    "",
    `Nel tuo account risultano ${reports} report video salvati${recent ? `, di cui ${recent} negli ultimi 7 giorni` : ""}.`,
    "",
    "Con il piano Pro puoi usare piu report video, archivio cloud e PDF sempre recuperabili, oltre alle funzioni Coach avanzate.",
    "",
    "Se vuoi, posso attivarti una breve demo o aiutarti a capire quale piano e piu adatto al tuo staff.",
    "",
    "Mario - MatchIQ Tactical"
  ].join("\n");

  return `mailto:${encodeURIComponent(email)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
}

function updateStats(users){
  const total=users.length;
  const free=users.filter(u=>normalizePlan(u.plan)==="free").length;
  const pro=users.filter(u=>normalizePlan(u.plan)==="pro").length;
  const scoutOwner=users.filter(u=>["scout","owner"].includes(normalizePlan(u.plan))).length;
  const subActive=users.filter(u=>String(u.subscription_status||"").toLowerCase()==="active").length;
  const videoLeads=users.filter(u=>Number(u.video_reports_total||0)>0 || Number(u.video_usage_today||0)>0).length;

  document.getElementById("statTotal").textContent=total;
  document.getElementById("statFree").textContent=free;
  document.getElementById("statPro").textContent=pro;
  document.getElementById("statScoutOwner").textContent=scoutOwner;
  document.getElementById("statSubActive").textContent=subActive;
  document.getElementById("statVideoLeads").textContent=videoLeads;
}

function renderUsers(users){
  const body=document.getElementById("usersBody");
  if(!body)return;

  updateStats(users);

  if(!users.length){
    body.innerHTML=`<tr><td colspan="12" class="loading">Nessun utente trovato.</td></tr>`;
    return;
  }

  body.innerHTML=users.map(u=>{
    const id=Number(u.id);
    const plan=normalizePlan(u.plan);
    const periodStart=u.current_period_start?formatDate(u.current_period_start):"--";
    const periodEnd=u.current_period_end?formatDate(u.current_period_end):"--";

    return`
      <tr>
        <td>${id}</td>
        <td>
          <div class="email-cell">${escapeHtml(u.email)}</div>
          <div class="muted">${escapeHtml(u.stripe_customer_id||u.provider_customer_id||"")}</div>
        </td>
        <td>${planBadge(plan)}</td>
        <td>${activeBadge(u.is_active)}</td>
        <td>
          ${verificationBadge(u.email_verified)}
          <div class="muted">${u.email_verified_at?escapeHtml(formatDate(u.email_verified_at)):"Da verificare"}</div>
        </td>
        <td>
          ${subBadge(u.subscription_status)}
          <div class="muted">${escapeHtml(u.provider_subscription_id||"")}</div>
        </td>
        <td>
          <strong>${escapeHtml(u.provider||"--")}</strong>
          <div class="muted">${escapeHtml(u.subscription_plan||"")}</div>
        </td>
        <td>
          <div>${escapeHtml(periodStart)}</div>
          <div class="muted">→ ${escapeHtml(periodEnd)}</div>
        </td>
        <td><span class="usage-pill">${Number(u.total_usage_today||0)}</span></td>
        <td class="video-cell">
          <strong class="${Number(u.video_usage_today||0)>0?"hot":""}">${Number(u.video_usage_today||0)} oggi</strong>
          <div class="muted">${Number(u.video_reports_last_7_days||0)} report 7g · ${Number(u.video_reports_total||0)} totali</div>
        </td>
        <td>${escapeHtml(formatDate(u.created_at))}</td>
        <td>
          <div class="row-actions">
            <select id="plan-${id}">
              <option value="free" ${plan==="free"?"selected":""}>Free</option>
              <option value="pro" ${plan==="pro"?"selected":""}>Pro</option>
              <option value="scout" ${plan==="scout"?"selected":""}>Scout</option>
              <option value="owner" ${plan==="owner"?"selected":""}>Owner</option>
            </select>
            <button class="btn green" onclick="updateUserPlan(${id})">Salva piano</button>
            <button class="btn cyan" onclick="contactVideoLead(${id})">Email Pro Video</button>
            <button class="btn gold" onclick="resendVerification(${id})">Reinvia verifica</button>
            ${
              Number(u.is_active)===1 || u.is_active===true
                ? `<button class="btn red" onclick="deactivateUser(${id})">Disattiva</button>`
                : `<button class="btn green" onclick="activateUser(${id})">Riattiva</button>`
            }
          </div>
        </td>
      </tr>`;
  }).join("");
}

function contactVideoLead(userId){
  const user=usersCache.find(u=>Number(u.id)===Number(userId));
  if(!user || !user.email){
    showNotice("Email utente non disponibile.","warn",5000);
    return;
  }

  window.location.href=videoLeadEmailUrl(user);
}

function exportVideoLeads(){
  const leads=usersCache.filter(u=>Number(u.video_reports_total||0)>0 || Number(u.video_usage_today||0)>0);
  if(!leads.length){
    showNotice("Nessun lead Video AI nella lista corrente.","warn",5000);
    return;
  }

  const header=["email","piano","usage_video_oggi","report_video_7g","report_video_totali","usage_oggi","creato"];
  const rows=leads.map(u=>[
    u.email||"",
    normalizePlan(u.plan),
    Number(u.video_usage_today||0),
    Number(u.video_reports_last_7_days||0),
    Number(u.video_reports_total||0),
    Number(u.total_usage_today||0),
    u.created_at||""
  ]);
  const csv=[header, ...rows].map(row=>row.map(csvCell).join(",")).join("\r\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download=`matchiq-video-leads-${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  showNotice(`Export creato: ${leads.length} lead Video AI.`,"ok",5000);
}

async function loadUsers(){
  if(!hasAdminAccess()){
    const body=document.getElementById("usersBody");
    if(body)body.innerHTML=`<tr><td colspan="12" class="loading">Accesso admin non configurato su questo dispositivo.</td></tr>`;
    showNotice("Accesso admin non configurato: accedi con account Owner/Admin oppure configura il token interno.","err",9000);
    return;
  }

  const body=document.getElementById("usersBody");
  if(body)body.innerHTML=`<tr><td colspan="12" class="loading">Caricamento utenti...</td></tr>`;

  const search=document.getElementById("searchInput")?.value.trim()||"";
  const plan=document.getElementById("planFilter")?.value||"all";
  const status=document.getElementById("statusFilter")?.value||"all";
  const limit=document.getElementById("limitFilter")?.value||"300";
  const params=new URLSearchParams({search,plan,status,limit});

  try{
    const res=await fetch(`${API_BASE}/admin/users?${params.toString()}`,{
      headers:adminHeaders(),
      cache:"no-store"
    });

    const data=await res.json();

    if(!res.ok || data.ok===false){
      throw new Error(data.detail||data.message||"Errore caricamento utenti");
    }

    usersCache=data.users||data.data||data.items||[];
    renderUsers(usersCache);
    showNotice(`Utenti caricati: ${usersCache.length}`,"ok",3500);

  }catch(e){
    console.error(e);
    if(body)body.innerHTML=`<tr><td colspan="12" class="loading">Errore: ${escapeHtml(e.message)}</td></tr>`;
    showNotice("Errore utenti: "+e.message,"err",9000);
  }
}

async function updateUserPlan(userId){
  const select=document.getElementById(`plan-${userId}`);
  const plan=select?.value||"free";

  if(!confirm(`Vuoi impostare il piano ${plan.toUpperCase()} per l'utente #${userId}?`))return;

  try{
    const res=await fetch(`${API_BASE}/admin/users/${userId}/plan`,{
      method:"PATCH",
      headers:adminHeaders({"Content-Type":"application/json"}),
      body:JSON.stringify({plan,deactivate:false})
    });

    const data=await res.json();

    if(!res.ok || data.ok===false){
      throw new Error(data.detail||data.message||"Errore aggiornamento piano");
    }

    showNotice("Piano aggiornato correttamente.","ok");
    await loadUsers();

  }catch(e){
    console.error(e);
    showNotice("Errore aggiornamento: "+e.message,"err",9000);
  }
}

async function deactivateUser(userId){
  if(!confirm(`Vuoi disattivare l'utente #${userId}?`))return;

  try{
    const res=await fetch(`${API_BASE}/admin/users/${userId}/deactivate`,{
      method:"POST",
      headers:adminHeaders()
    });

    const data=await res.json();

    if(!res.ok || data.ok===false){
      throw new Error(data.detail||data.message||"Errore disattivazione");
    }

    showNotice("Utente disattivato.","ok");
    await loadUsers();

  }catch(e){
    console.error(e);
    showNotice("Errore disattivazione: "+e.message,"err",9000);
  }
}

async function activateUser(userId){
  if(!confirm(`Vuoi riattivare l'utente #${userId}?`))return;

  try{
    const res=await fetch(`${API_BASE}/admin/users/${userId}/activate`,{
      method:"POST",
      headers:adminHeaders()
    });

    const data=await res.json();

    if(!res.ok || data.ok===false){
      throw new Error(data.detail||data.message||"Errore riattivazione");
    }

    showNotice("Utente riattivato.","ok");
    await loadUsers();

  }catch(e){
    console.error(e);
    showNotice("Errore riattivazione: "+e.message,"err",9000);
  }
}

async function resendVerification(userId){
  if(!confirm(`Vuoi reinviare la verifica email all'utente #${userId}?`))return;

  try{
    const res=await fetch(`${API_BASE}/admin/users/${userId}/resend-verification`,{
      method:"POST",
      headers:adminHeaders()
    });

    const data=await res.json();

    if(!res.ok || data.ok===false){
      throw new Error(data.detail||data.message||"Errore reinvio verifica");
    }

    showNotice(data.message||"Email di verifica reinviata.","ok",6000);

  }catch(e){
    console.error(e);
    showNotice("Errore verifica: "+e.message,"err",9000);
  }
}

document.addEventListener("DOMContentLoaded",()=>{
  if(window.MatchIQAuth && !MatchIQAuth.requireAdminPage())return;
  loadUsers();
