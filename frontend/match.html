<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>MatchIQ - Analisi partita</title>

<link rel="stylesheet" href="css/match.css">
<link rel="stylesheet" href="/css/global-nav.css?v=10503">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="js/auth.js?v=10513"></script>
<script src="js/api.js"></script>
<script src="js/match-state.js"></script>
<script src="js/utils.js"></script>
<script src="js/pdf.js"></script>
<script src="js/match-ui.js"></script>
<script src="js/match-flow.js"></script>
<script src="js/match-render-blocks.js"></script>
<script src="js/match-render.js"></script>
</head>

<body data-miq-module="live">
<template><div class="topbar">
    <div>
        <div class="logo">⚽ MatchIQ</div>
        <div class="subtitle">Analisi tattica live</div>
    </div>

    <div class="top-actions">
        <div class="live-badge">
            <span class="live-dot"></span>
            <span id="liveUpdateText">Live</span>
            <span>•</span>
            <span id="refreshTimerText">Aggiornamento --s</span>
        </div>

        <button class="refresh-btn" onclick="manualRefresh()">↻ Aggiorna</button>
        <button class="pdf-btn" onclick="downloadPDFReport()">📄 Scarica PDF</button>
        <button class="dashboard-btn" onclick="goBackToDashboard()">Dashboard</button>
    </div>
</div></template>

<div class="miq-module-toolbar" aria-label="Strumenti partita live">
    <div class="miq-toolbar-state live-badge">
        <span class="live-dot"></span><span id="liveUpdateText">Live</span><span id="refreshTimerText">Aggiornamento --s</span>
    </div>
    <button class="refresh-btn" type="button" onclick="manualRefresh()">Aggiorna</button>
    <button class="pdf-btn" type="button" onclick="downloadPDFReport()">Scarica PDF</button>
</div>

<div class="live-overlay" id="liveOverlay">
    <div class="live-overlay-title" id="liveOverlayTitle">⚡ Evento live</div>
    <div class="live-overlay-text" id="liveOverlayText">Flusso partita aggiornato.</div>
</div>

<div class="main" id="app">
    <div class="card">
        <div class="section-content">Caricamento analisi...</div>
    </div>
</div>

<script src="/js/global-nav-config.js?v=10503"></script>
<script src="/js/global-nav-state.js?v=10503"></script>
<script src="/js/global-nav-render.js?v=10503"></script>
<script src="/js/global-nav-menu.js?v=10503"></script>

<script>
function isMobileDevice(){
    return window.innerWidth <= 768 || /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
}

function goBackToDashboard(){
    window.location.href = isMobileDevice() ? "/mobile.html" : "/index.html";
}

function getMatchIdFromPageUrl(){
    const params = new URLSearchParams(window.location.search);
    return (
        params.get("id") ||
        params.get("match_id") ||
        params.get("fixture_id") ||
        params.get("matchId") ||
        ""
    );
}

function renderMissingMatchId(){
    const app = document.getElementById("app");

    if(!app) return;

    app.innerHTML = `
        <div class="card">
            <div class="section-content">
                <div class="error-box" style="background:linear-gradient(135deg,rgba(255,49,92,.28),rgba(139,29,53,.22));border:1px solid rgba(255,49,92,.35);">
                    ❌ ID partita mancante.
                    <br><br>
                    Apri l’analisi partendo da una partita live nella dashboard mobile o desktop.
                    <br><br>
                    <button class="dashboard-btn" onclick="goBackToDashboard()" style="margin-top:10px;">
                        Torna alla Dashboard
                    </button>
                </div>
            </div>
        </div>
    `;
}

document.addEventListener("visibilitychange", () => {
    if(document.hidden){
        if(typeof refreshInterval !== "undefined" && refreshInterval) clearInterval(refreshInterval);
        if(typeof countdownInterval !== "undefined" && countdownInterval) clearInterval(countdownInterval);
    }else{
        const matchId = getMatchIdFromPageUrl();

        if(matchId && typeof loadMatch === "function"){
            loadMatch({silent:true});
        }
    }
});

(function bootMatchPage(){
    const matchId = getMatchIdFromPageUrl();

    if(!matchId){
        renderMissingMatchId();
        return;
    }

    if(typeof renderCachedDataIfAvailable === "function"){
        renderCachedDataIfAvailable();
    }

    if(typeof loadMatch === "function"){
        loadMatch();
    }else{
        const app = document.getElementById("app");
        if(app){
            app.innerHTML = `
                <div class="card">
                    <div class="section-content">
                        <div class="error-box">
                            Errore: analisi partita non disponibile.
                        </div>
                    </div>
                </div>
            `;
        }
    }
})();
</script>

<script src="/js/app-meta.js"></script>
</body>
</html>
