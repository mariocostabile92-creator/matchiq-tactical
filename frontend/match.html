<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>MatchIQ Tactical - Match Analysis</title>

<link rel="stylesheet" href="css/match.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/match-state.js"></script>
<script src="js/utils.js"></script>
<script src="js/pdf.js"></script>
<script src="js/match-api.js"></script>
<script src="js/match-ui.js"></script>
<script src="js/match-flow.js"></script>
<script src="js/match-render-blocks.js"></script>
<script src="js/match-render.js"></script>
</head>

<body>
<div class="topbar">
    <div>
        <div class="logo">⚽ MatchIQ Tactical</div>
        <div class="subtitle">AI Tactical Analysis Platform</div>
    </div>

    <div class="top-actions">
        <div class="live-badge">
            <span class="live-dot"></span>
            <span id="liveUpdateText">LIVE UPDATE</span>
            <span>•</span>
            <span id="refreshTimerText">Next refresh --s</span>
        </div>

        <button class="refresh-btn" onclick="manualRefresh()">↻ Refresh</button>
        <button class="pdf-btn" onclick="downloadPDFReport()">📄 Download PDF</button>
        <button class="dashboard-btn" onclick="goBackToDashboard()">Dashboard</button>
    </div>
</div>

<div class="live-overlay" id="liveOverlay">
    <div class="live-overlay-title" id="liveOverlayTitle">⚡ LIVE EVENT</div>
    <div class="live-overlay-text" id="liveOverlayText">Match flow updated.</div>
</div>

<div class="main" id="app">
    <div class="card">
        <div class="section-content">Loading match...</div>
    </div>
</div>

<script>
function isMobileDevice(){
    return window.innerWidth <= 768 || /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
}

function goBackToDashboard(){
    window.location.href = isMobileDevice() ? "/mobile.html" : "/index.html";
}

function getMatchIdFromPageUrl(){
    const params = new URLSearchParams(window.location.search);
    return (
        params.get("id") ||
        params.get("match_id") ||
        params.get("fixture_id") ||
        params.get("matchId") ||
        ""
    );
}

function renderMissingMatchId(){
    const app = document.getElementById("app");

    if(!app) return;

    app.innerHTML = `
        <div class="card">
            <div class="section-content">
                <div class="error-box" style="background:linear-gradient(135deg,rgba(255,49,92,.28),rgba(139,29,53,.22));border:1px solid rgba(255,49,92,.35);">
                    ❌ ID partita mancante.
                    <br><br>
                    Apri l’analisi partendo da una partita live nella dashboard mobile o desktop.
                    <br><br>
                    <button class="dashboard-btn" onclick="goBackToDashboard()" style="margin-top:10px;">
                        Torna alla Dashboard
                    </button>
                </div>
            </div>
        </div>
    `;
}

document.addEventListener("visibilitychange", () => {
    if(document.hidden){
        if(typeof refreshInterval !== "undefined" && refreshInterval) clearInterval(refreshInterval);
        if(typeof countdownInterval !== "undefined" && countdownInterval) clearInterval(countdownInterval);
    }else{
        const matchId = getMatchIdFromPageUrl();

        if(matchId && typeof loadMatch === "function"){
            loadMatch({silent:true});
        }
    }
});

(function bootMatchPage(){
    const matchId = getMatchIdFromPageUrl();

    if(!matchId){
        renderMissingMatchId();
        return;
    }

    if(typeof renderCachedDataIfAvailable === "function"){
        renderCachedDataIfAvailable();
    }

    if(typeof loadMatch === "function"){
        loadMatch();
    }else{
        const app = document.getElementById("app");
        if(app){
            app.innerHTML = `
                <div class="card">
                    <div class="section-content">
                        <div class="error-box">
                            Errore: motore analisi non disponibile.
                        </div>
                    </div>
                </div>
            `;
        }
    }
})();
</script>

</body>
</html>
