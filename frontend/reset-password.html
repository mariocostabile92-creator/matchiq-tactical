<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>MatchIQ Tactical - Reset Password V8.2</title>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#00f5a0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="MatchIQ">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/assets/matchiq-logo.png">

<style>
:root{
    --bg:#03050b;
    --line:rgba(255,255,255,.11);
    --text:#ffffff;
    --muted:#aebee7;
    --soft:#c7d7f2;
    --green:#00f5a0;
    --blue:#2f6bff;
    --gold:#ffe28a;
    --red:#ff4058;
    --purple:#8b5cf6;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    min-height:100%;
    overflow-x:hidden;
}

body{
    font-family:Inter,Arial,sans-serif;
    background:
        radial-gradient(circle at 15% 0%,rgba(47,107,255,.28),transparent 32%),
        radial-gradient(circle at 88% 12%,rgba(0,245,160,.16),transparent 30%),
        radial-gradient(circle at bottom,rgba(139,92,246,.13),transparent 36%),
        linear-gradient(180deg,#07101f 0%,#03050b 60%,#02030a 100%);
    color:var(--text);
}

button,
input{
    font-family:inherit;
}

a{
    color:inherit;
    text-decoration:none;
}

.page{
    min-height:100vh;
    display:grid;
    grid-template-rows:auto 1fr;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:18px;
    padding:18px 28px;
    background:rgba(5,10,24,.86);
    border-bottom:1px solid var(--line);
    backdrop-filter:blur(16px);
    position:sticky;
    top:0;
    z-index:20;
}

.brand{
    display:flex;
    align-items:center;
    gap:12px;
    min-width:0;
}

.brand img{
    width:48px;
    height:48px;
    object-fit:contain;
    border-radius:15px;
    filter:drop-shadow(0 12px 28px rgba(0,245,160,.16));
}

.logo{
    font-size:25px;
    font-weight:1000;
    letter-spacing:-.6px;
    line-height:1.05;
}

.subtitle{
    font-size:12px;
    color:var(--muted);
    margin-top:4px;
    font-weight:800;
}

.top-actions{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
}

.btn{
    border:0;
    border-radius:15px;
    padding:12px 16px;
    color:white;
    font-weight:1000;
    cursor:pointer;
    background:linear-gradient(135deg,var(--blue),#7c4dff);
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    min-height:44px;
    white-space:nowrap;
    transition:.18s ease;
}

.btn:hover{
    transform:translateY(-1px);
    filter:brightness(1.07);
}

.btn.green{
    background:linear-gradient(135deg,var(--green),var(--blue));
    color:#06111c;
}

.btn.dark{
    background:rgba(255,255,255,.08);
    border:1px solid var(--line);
}

.main{
    width:100%;
    max-width:980px;
    margin:0 auto;
    padding:34px 24px;
    display:grid;
    place-items:center;
}

.reset-card{
    width:100%;
    max-width:520px;
    background:
        radial-gradient(circle at top right,rgba(0,245,160,.10),transparent 34%),
        linear-gradient(145deg,rgba(255,255,255,.075),rgba(255,255,255,.035));
    border:1px solid var(--line);
    border-radius:30px;
    padding:30px;
    box-shadow:0 25px 80px rgba(0,0,0,.28);
}

.reset-head{
    text-align:center;
    margin-bottom:22px;
}

.reset-logo{
    width:70px;
    height:70px;
    object-fit:contain;
    border-radius:20px;
    margin:0 auto 14px;
    display:block;
    filter:drop-shadow(0 16px 35px rgba(0,245,160,.18));
}

h1{
    font-size:30px;
    letter-spacing:-.5px;
    margin-bottom:8px;
}

p{
    color:var(--soft);
    line-height:1.65;
    font-size:15px;
}

.form{
    display:grid;
    gap:16px;
    margin-top:18px;
}

.field{
    display:flex;
    flex-direction:column;
    gap:8px;
}

.field label{
    color:var(--muted);
    font-size:12px;
    font-weight:1000;
    text-transform:uppercase;
    letter-spacing:.3px;
}

.input-wrap{
    position:relative;
}

.input{
    width:100%;
    border:1px solid rgba(255,255,255,.10);
    background:rgba(4,8,18,.85);
    color:#fff;
    border-radius:16px;
    padding:15px 15px;
    outline:none;
    font-weight:800;
    min-height:52px;
}

.input.has-toggle{
    padding-right:96px;
}

.input:focus{
    border-color:rgba(0,245,160,.45);
    box-shadow:0 0 0 4px rgba(0,245,160,.08);
}

.password-toggle{
    position:absolute;
    right:8px;
    top:50%;
    transform:translateY(-50%);
    border:0;
    border-radius:12px;
    padding:9px 11px;
    background:rgba(255,255,255,.08);
    color:#dbe6ff;
    font-size:12px;
    font-weight:1000;
    cursor:pointer;
}

.password-toggle:hover{
    background:rgba(255,255,255,.13);
}

.reset-btn{
    width:100%;
    border:0;
    border-radius:17px;
    padding:15px 16px;
    min-height:54px;
    background:linear-gradient(135deg,var(--green),var(--blue));
    color:#06111c;
    font-size:15px;
    font-weight:1000;
    cursor:pointer;
    margin-top:4px;
}

.reset-btn:disabled{
    opacity:.65;
    cursor:not-allowed;
}

.message{
    margin-top:16px;
    padding:13px 14px;
    border-radius:16px;
    text-align:center;
    display:none;
    font-size:13px;
    line-height:1.45;
    font-weight:900;
}

.message.show{
    display:block;
}

.message.error{
    color:#ffb8b8;
    background:rgba(255,70,70,.10);
    border:1px solid rgba(255,70,70,.25);
}

.message.success{
    color:var(--green);
    background:rgba(0,245,160,.10);
    border:1px solid rgba(0,245,160,.25);
}

.message.warn{
    color:var(--gold);
    background:rgba(247,183,51,.10);
    border:1px solid rgba(247,183,51,.25);
}

.links{
    display:grid;
    gap:12px;
    margin-top:20px;
    text-align:center;
}

.links a{
    color:#9fc0ff;
    font-weight:1000;
    text-decoration:none;
    cursor:pointer;
    font-size:14px;
}

.links a:hover{
    color:#fff;
}

.small{
    color:var(--muted);
    font-size:12px;
    line-height:1.6;
    margin-top:14px;
    text-align:center;
}

@media(max-width:900px){
    .topbar{
        padding:calc(10px + env(safe-area-inset-top)) 14px 12px;
    }

    .brand img{
        width:42px;
        height:42px;
    }

    .logo{
        font-size:21px;
    }

    .subtitle{
        font-size:11px;
    }

    .top-actions{
        display:none;
    }

    .main{
        padding:18px 14px 34px;
        align-items:start;
    }

    .reset-card{
        border-radius:24px;
        padding:22px;
    }

    .reset-logo{
        width:62px;
        height:62px;
    }

    h1{
        font-size:26px;
    }

    .input,
    .reset-btn{
        min-height:54px;
    }
}

@media(max-width:380px){
    .logo{
        font-size:19px;
    }

    .subtitle{
        font-size:10px;
    }

    .reset-card{
        padding:18px;
    }

    h1{
        font-size:24px;
    }

    .input.has-toggle{
        padding-right:88px;
    }

    .password-toggle{
        font-size:11px;
        padding:8px 9px;
    }
}
</style>
</head>

<body>
<div class="page">

<header class="topbar">
    <div class="brand">
        <img src="/assets/matchiq-logo.png" alt="MatchIQ logo" onerror="this.style.display='none'">
        <div>
            <div class="logo">MatchIQ Tactical</div>
            <div class="subtitle">Reset password · Account</div>
        </div>
    </div>

    <div class="top-actions">
        <a class="btn dark" href="/index.html?v=10523">Home</a>
        <a class="btn dark" href="/login.html?v=10523">Login</a>
        <a class="btn green" href="/account.html?v=10523">Account</a>
    </div>
</header>

<main class="main">
    <section class="reset-card">
        <div class="reset-head">
            <img class="reset-logo" src="/assets/matchiq-logo.png" alt="MatchIQ" onerror="this.style.display='none'">
            <h1>Imposta nuova password</h1>
            <p>
                Inserisci una nuova password per il tuo account MatchIQ.
            </p>
        </div>

        <form id="resetForm" class="form">
            <div class="field">
                <label for="password">Nuova password</label>
                <div class="input-wrap">
                    <input class="input has-toggle" type="password" id="password" required placeholder="Minimo 6 caratteri" autocomplete="new-password">
                    <button class="password-toggle" type="button" id="togglePasswordBtn" onclick="togglePassword('password','togglePasswordBtn')">Mostra</button>
                </div>
            </div>

            <div class="field">
                <label for="confirmPassword">Conferma password</label>
                <div class="input-wrap">
                    <input class="input has-toggle" type="password" id="confirmPassword" required placeholder="Ripeti nuova password" autocomplete="new-password">
                    <button class="password-toggle" type="button" id="toggleConfirmPasswordBtn" onclick="togglePassword('confirmPassword','toggleConfirmPasswordBtn')">Mostra</button>
                </div>
            </div>

            <button type="submit" class="reset-btn" id="resetBtn">
                Aggiorna password
            </button>
        </form>

        <div id="message" class="message"></div>

        <div class="links">
            <a href="/login.html?v=10523">← Torna al login</a>
            <a href="/index.html?v=10523">Torna alla Home</a>
        </div>

        <div class="small">
            Il link di reset scade per sicurezza. Se non funziona, richiedi un nuovo reset dal login.
        </div>
    </section>
</main>

</div>

<script>
const API_BASE = `${window.location.origin}/api`;
const APP_VERSION = "10360";

function getResetToken(){
    const params = new URLSearchParams(window.location.search);
    return (params.get("token") || "").trim();
}

function setMessage(text,type="success"){
    const message = document.getElementById("message");
    if(!message) return;

    message.textContent = text;
    message.className = `message show ${type}`;
}

function togglePassword(inputId,buttonId){
    const input = document.getElementById(inputId);
    const btn = document.getElementById(buttonId);

    if(!input || !btn) return;

    const isHidden = input.type === "password";
    input.type = isHidden ? "text" : "password";
    btn.textContent = isHidden ? "Nascondi" : "Mostra";
}

async function confirmReset(token,password){
    const res = await fetch(`${API_BASE}/auth/password-reset/confirm`, {
        method:"POST",
        headers:{
            "Content-Type":"application/json",
            "Accept":"application/json"
        },
        body:JSON.stringify({
            token,
            password
        })
    });

    const data = await res.json().catch(() => ({}));

    if(!res.ok || data.success === false){
        throw new Error(data.detail || data.message || "Reset password non riuscito");
    }

    return data;
}

document.getElementById("resetForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const token = getResetToken();
    const btn = document.getElementById("resetBtn");
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if(!token){
        setMessage("Token reset mancante. Richiedi un nuovo reset dal login.", "error");
        return;
    }

    if(!password || !confirmPassword){
        setMessage("Inserisci e conferma la nuova password.", "error");
        return;
    }

    if(password.length < 6){
        setMessage("La password deve contenere almeno 6 caratteri.", "error");
        return;
    }

    if(password !== confirmPassword){
        setMessage("Le password non coincidono.", "error");
        return;
    }

    btn.disabled = true;
    btn.textContent = "Aggiornamento...";

    try{
        setMessage("Aggiornamento password in corso...", "warn");

        await confirmReset(token,password);

        setMessage("Password aggiornata. Ora puoi fare login con la nuova password.", "success");

        setTimeout(() => {
            window.location.href = `/login.html?v=${APP_VERSION}&reset=success`;
        },1200);

    }catch(err){
        setMessage(err.message || "Errore reset password", "error");
    }finally{
        btn.disabled = false;
        btn.textContent = "Aggiorna password";
    }
});

if(!getResetToken()){
    setMessage("Token reset mancante. Torna al login e richiedi un nuovo reset password.", "error");
}

if("serviceWorker" in navigator){
    window.addEventListener("load", () => {
        navigator.serviceWorker.register("/service-worker.js")
            .catch(err => console.warn("Service Worker non registrato:", err));
    });
}
</script>

<script src="/js/app-meta.js"></script>
</body>
</html>
